workflows:
  ios-expo-release:
    name: iOS Expo Release Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        # Codemagicの環境変数（Environment variables）で以下のグループを作成し、変数を設定してください
        # 1. expoグループ: EAS_TOKEN (Expoのアクセストークン)
        # 2. app_store_credentialsグループ: 
        #    - APP_STORE_CONNECT_PRIVATE_KEY
        #    - APP_STORE_CONNECT_KEY_IDENTIFIER
        #    - APP_STORE_CONNECT_ISSUER_ID
        - expo
        - app_store_credentials
      node: 20
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install
      - name: Install EAS CLI
        script: |
          npm install -g eas-cli
      - name: Build iOS .ipa with EAS local
        script: |
          cd frontend
          export EXPO_TOKEN=$EAS_TOKEN
          # CodemagicのMac環境上でローカルビルドを行うことでEASのキューを回避します
          eas build --platform ios --profile production --local --non-interactive --output=$CM_BUILD_DIR/app.ipa
    artifacts:
      - $CM_BUILD_DIR/app.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
      email:
        recipients:
          - tatsunobu1111@gmail.com
        notify:
          success: true
          failure: true
