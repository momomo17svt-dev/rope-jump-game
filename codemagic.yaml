workflows:
  ios-production:
    name: iOS Production (TestFlight)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - expo
        - app_store_credentials
      node: 20
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install
      - name: Install EAS CLI
        script: |
          npm install -g eas-cli
      - name: Build iOS .ipa with EAS local
        script: |
          cd frontend
          export EXPO_TOKEN=$EAS_TOKEN
          eas build --platform ios --profile production --local --non-interactive --output=$CM_BUILD_DIR/app.ipa
    artifacts:
      - $CM_BUILD_DIR/app.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
      email:
        recipients:
          - tatsunobu1111@gmail.com
        notify:
          success: true
          failure: true
