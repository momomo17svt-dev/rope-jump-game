workflows:
  ios-expo-release:
    name: iOS Expo Release Build
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      node_versions:
        - 20.x
      groups:
        # CodemagicのUIで「apple_credentials」という環境変数グループを作成し、
        # App Store ConnectのAPIキーなどを設定します
        - apple_credentials
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install
      - name: Expo prebuild
        script: |
          cd frontend
          npx expo prebuild --platform ios
      - name: Install CocoaPods
        script: |
          cd frontend/ios
          pod install
      - name: Set up keychain to be used for codesigning
        script: |
          keychain initialize
      - name: Fetch signing files
        script: |
          # バンドルIDを指定して証明書とプロファイルを自動取得します
          app-store-connect fetch-signing-files "com.tatsunobu.ropejump" --type IOS_APP_STORE --create
      - name: Add certificates to keychain
        script: |
          keychain add-certificates
      - name: Set up code signing settings on Xcode project
        script: |
          cd frontend/ios
          xcode-project use-profiles
      - name: Build ipa for distribution
        script: |
          cd frontend/ios
          WORKSPACE=$(ls -1 *.xcworkspace | head -n 1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Building Workspace: $WORKSPACE, Scheme: $SCHEME"
          xcode-project build-ipa --workspace "$WORKSPACE" --scheme "$SCHEME"
    artifacts:
      - frontend/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # Trueにすると自動的にTestFlightにアップロードされます
        submit_to_testflight: false
