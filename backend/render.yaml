databases:
  - name: jumprope-db
    databaseName: jumprope
    plan: free
    region: singapore

services:
  - type: web
    name: jumprope-api
    runtime: docker
    region: singapore
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jumprope-db
          property: connectionString
      - key: PORT
        value: "8080"
